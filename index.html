<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cash Cycle Analyzer</title>


    <script src="xlsx.full.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>

    <h1>Cash Cycle Analyzer</h1>
    <p>Upload XLSX with AR, Sales, Inventory, COGS, Payables (current/last) to calculate DSO, DIO, DPO, CCC vs objectives</p>

        </header>
        
        <div class="controls">
            <input type="file" id="xlsxFile" accept=".xlsx" />

            <button id="loadBtn">Load Op Data</button>


            <button id="downloadTemplateBtn">Download Template</button>
            <button id="ratiosBtn" style="background: linear-gradient(45deg, #FF8C00, #FFA500);">Show summary</button>
        </div>

        

        <div id="status" class="status">Ready</div>
        <div id="metricsContainer" class="metrics-container"></div>

    </div>
    
    <script src="javascript.js"></script>
</body>
</html>
